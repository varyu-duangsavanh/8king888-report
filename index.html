<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4king77 - ລະບົບຄຸ້ມຄອງ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--gold3:#FF8C00;
  --gold-dim:rgba(255,215,0,0.15);--gold-border:rgba(255,215,0,0.22);
  --green:#00ff88;--red:#ff4455;--blue:#44aaff;--purple:#cc44ff;
  --bg:#060606;--card:rgba(14,14,2,0.97);
  --text:#fff;--text-dim:rgba(255,255,255,0.45);--text-faint:rgba(255,255,255,0.18);
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.3);border-radius:3px;}

/* BG */
.gbg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,215,0,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.016) 1px,transparent 1px);background-size:55px 55px;pointer-events:none;z-index:0;}
.gorb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);}

/* CARD */
.card{background:var(--card);border:1px solid var(--gold-border);border-radius:var(--r);box-shadow:0 4px 28px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,215,0,0.05);backdrop-filter:blur(12px);transition:border-color .3s,box-shadow .3s;position:relative;overflow:hidden;}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.28),transparent);}
.card.glow{border-color:rgba(255,215,0,0.6);box-shadow:0 0 24px rgba(255,215,0,0.16),0 4px 28px rgba(0,0,0,0.6);}
.card.glow-green{border-color:rgba(0,255,136,0.5);box-shadow:0 0 20px rgba(0,255,136,0.14);}
.card.glow-red{border-color:rgba(255,68,85,0.5);box-shadow:0 0 20px rgba(255,68,85,0.14);}

/* BUTTONS */
.btn{border:none;border-radius:var(--rs);padding:10px 20px;font-family:'Exo 2',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;font-size:13px;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#000;}
.btn-gold:hover{box-shadow:0 0 18px rgba(255,215,0,0.5);transform:translateY(-1px);}
.btn-outline{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.32);color:var(--gold);}
.btn-outline:hover{background:rgba(255,215,0,0.14);}
.btn-red{background:rgba(255,68,85,0.1);border:1px solid rgba(255,68,85,0.32);color:var(--red);}
.btn-red:hover{background:rgba(255,68,85,0.2);}
.btn-blue{background:rgba(68,170,255,0.1);border:1px solid rgba(68,170,255,0.32);color:var(--blue);}
.btn-green{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000;font-weight:900;padding:14px 32px;border-radius:12px;}
.btn-stop{background:linear-gradient(135deg,#ff4455,#cc2233);color:#fff;font-weight:900;padding:14px 32px;border-radius:12px;}

/* INPUTS */
input,select,textarea{background:rgba(255,255,255,0.05);border:1px solid var(--gold-border);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:rgba(255,215,0,0.65);box-shadow:0 0 0 3px rgba(255,215,0,0.07);}
select{background:#0e0d00;cursor:pointer;}
input[type=number]::-webkit-inner-spin-button{opacity:.3;}
label{color:var(--text-dim);font-size:11px;letter-spacing:.8px;display:block;margin-bottom:5px;text-transform:uppercase;}

/* LAYOUT */
#app{display:flex;height:100vh;}
#sb{width:238px;min-height:100vh;background:linear-gradient(180deg,#0d0d00,#060606);border-right:1px solid var(--gold-border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:100;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{height:58px;border-bottom:1px solid var(--gold-border);display:flex;align-items:center;padding:0 20px;gap:12px;background:rgba(6,6,0,0.93);backdrop-filter:blur(12px);flex-shrink:0;z-index:50;}
#ct{flex:1;padding:22px 20px;overflow-y:auto;}

/* SIDEBAR */
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--gold-border);display:flex;align-items:center;gap:12px;}
.bi{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px rgba(255,215,0,0.44);flex-shrink:0;}
.bn{font-family:'Orbitron',monospace;font-size:15px;color:var(--gold);font-weight:900;letter-spacing:2px;text-shadow:0 0 10px rgba(255,215,0,0.5);}
.bs{font-size:8px;color:var(--text-faint);letter-spacing:1.5px;margin-top:1px;}
nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.ni{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;color:var(--text-dim);font-size:13px;font-weight:500;}
.ni:hover{background:rgba(255,215,0,0.05);color:rgba(255,255,255,0.8);}
.ni.active{background:linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,140,0,0.07));border-left-color:var(--gold);color:var(--gold);font-weight:700;}
.nd{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);margin-left:auto;}
.uinfo{padding:13px 18px;border-top:1px solid var(--gold-border);}
.uav{width:32px;height:32px;border-radius:50%;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.28);display:flex;align-items:center;justify-content:center;font-size:14px;}

/* STAT */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:13px;margin-bottom:18px;}
.sc{padding:20px 22px;position:relative;overflow:hidden;}
.sc .bgi{position:absolute;top:-15px;right:-10px;font-size:70px;opacity:.04;pointer-events:none;}
.sl{color:var(--text-dim);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.sv{font-family:'Orbitron',monospace;font-size:21px;font-weight:900;}
.ss{color:var(--text-faint);font-size:11px;margin-top:4px;}
.sbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.3;}

/* BADGE */
.badge{padding:2px 10px;border-radius:20px;font-size:10px;font-family:'Share Tech Mono',monospace;letter-spacing:.8px;border:1px solid;}
.bon{color:#00ff88;background:rgba(0,255,136,0.09);border-color:rgba(0,255,136,0.32);}
.boff{color:#ff4455;background:rgba(255,68,85,0.09);border-color:rgba(255,68,85,0.32);}
.bbrk{color:var(--gold);background:rgba(255,215,0,0.09);border-color:rgba(255,215,0,0.32);}
.bprc{color:var(--blue);background:rgba(68,170,255,0.09);border-color:rgba(68,170,255,0.32);}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;color:rgba(255,215,0,0.6);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;border-bottom:1px solid rgba(255,215,0,0.16);font-weight:600;}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.8);}
tr:hover td{background:rgba(255,215,0,0.022);}

/* RING */
.rrow{display:flex;justify-content:space-around;align-items:center;gap:10px;flex-wrap:wrap;}
.rw{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.rl{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rp{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;}
.rn{font-size:9px;color:var(--text-dim);}

/* BAR CHART */
.bc{display:flex;align-items:flex-end;gap:5px;height:78px;}
.bcc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--gold),var(--gold3));box-shadow:0 0 8px rgba(255,215,0,0.3);min-height:3px;}
.bday{color:var(--text-faint);font-size:9px;}

/* SECTION TITLE */
.st{color:rgba(255,215,0,0.58);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,215,0,0.18),transparent);}

/* PAGE HEADER */
.ph{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
.pt{font-family:'Orbitron',monospace;font-size:18px;color:var(--gold);font-weight:900;text-shadow:0 0 14px rgba(255,215,0,0.38);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.87);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(10px);}
.mb{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:30px;margin:20px;}
.mt{font-family:'Share Tech Mono',monospace;color:var(--gold);font-size:15px;margin-bottom:20px;letter-spacing:.8px;}
.fg{display:grid;gap:13px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fgr{display:flex;flex-direction:column;}
.ma{display:flex;gap:10px;margin-top:20px;}
.ma .btn{flex:1;padding:13px;}

/* CLOCK */
.lc{font-family:'Share Tech Mono',monospace;color:var(--gold);font-size:13px;text-shadow:0 0 10px rgba(255,215,0,0.55);}

/* SHIFT TIMER */
.sti{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:var(--gold);text-shadow:0 0 28px rgba(255,215,0,0.6);letter-spacing:4px;text-align:center;padding:18px 0;}

/* PARTNER */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px;}
.psi{width:70px;background:rgba(255,255,255,0.05);border:1px solid currentColor;border-radius:6px;padding:6px 8px;text-align:center;font-weight:900;font-size:20px;font-family:'Orbitron',monospace;outline:none;}

/* NOTIF */
.nb{position:relative;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;}
.nb:hover{background:var(--gold-dim);}
.nd2{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#ff4455;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:900;}

/* TIER */
.tc{padding:8px 15px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.25);border-radius:8px;font-size:12px;}
.tr2{color:var(--gold);font-weight:900;margin-left:8px;font-family:'Orbitron',monospace;}

/* EXPENSE BAR */
.ebg{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:8px;}
.ef{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold3));box-shadow:0 0 8px rgba(255,215,0,0.4);}

/* REPORT */
.rsh{color:rgba(255,215,0,0.6);font-size:10px;letter-spacing:1.8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,215,0,0.13);text-transform:uppercase;}
.rrow2{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}

/* SCORE BAR */
.scbar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:6px;}
.scfill{height:100%;border-radius:2px;}

/* LOGIN */
#lp{min-height:100vh;background:radial-gradient(ellipse at 15% 50%,rgba(40,30,0,.78) 0%,#060606 55%),radial-gradient(ellipse at 85% 15%,rgba(55,38,0,.6) 0%,transparent 50%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.lgb{position:absolute;inset:0;background-image:linear-gradient(rgba(255,215,0,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.02) 1px,transparent 1px);background-size:50px 50px;}
.lo{position:absolute;border-radius:50%;pointer-events:none;filter:blur(70px);}
.lcard{width:100%;max-width:420px;padding:36px;position:relative;z-index:1;}
.llogo{text-align:center;margin-bottom:34px;}
.lcrown{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 13px;box-shadow:0 0 42px rgba(255,215,0,0.52),0 0 88px rgba(255,215,0,0.18);}
.ltitle{font-family:'Orbitron',monospace;font-size:30px;color:var(--gold);font-weight:900;letter-spacing:5px;text-shadow:0 0 26px rgba(255,215,0,0.65);}
.lsub{color:var(--text-faint);font-size:10px;letter-spacing:2px;margin-top:5px;}
.lf{margin-bottom:17px;}
.liw{position:relative;}
.lii{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.55;}
.lin{padding-left:42px!important;}
.lbtn{width:100%;padding:14px;font-size:14px;letter-spacing:1.5px;margin-top:6px;border-radius:10px;box-shadow:0 0 20px rgba(255,215,0,0.38);}
.lhint{color:var(--text-faint);font-size:10px;text-align:center;margin-top:16px;}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-bottom:13px;padding:8px;background:rgba(255,68,85,0.09);border:1px solid rgba(255,68,85,0.28);border-radius:8px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(0,0,0,0.9);border:1px solid var(--gold-border);border-radius:10px;padding:12px 18px;font-size:13px;z-index:9999;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px);transform:translateX(120%);transition:transform .3s ease;max-width:300px;}
.toast.show{transform:translateX(0);}
.toast.success{border-color:rgba(0,255,136,0.5);}
.toast.error{border-color:rgba(255,68,85,0.5);}

/* ANIMATIONS */
@keyframes si{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes rtpulse{0%,100%{box-shadow:0 0 6px var(--green);}50%{box-shadow:0 0 14px var(--green),0 0 28px rgba(0,255,136,0.4);}}
.ai{animation:si .35s ease both;}
#rt-dot{animation:rtpulse 2.5s ease-in-out infinite;}

/* MISC */
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.18),transparent);margin:18px 0;}
.g20{display:flex;flex-direction:column;gap:20px;}
.g12{display:flex;flex-direction:column;gap:12px;}
.tg{color:var(--gold);} .tgr{color:var(--green);} .tr{color:var(--red);} .to{color:var(--gold3);} .td{color:var(--text-dim);}
.fm{font-family:'Share Tech Mono',monospace;} .fo{font-family:'Orbitron',monospace;}
.bold{font-weight:700;}
.p16{padding:16px;}.p20{padding:20px;}.p24{padding:24px;}.p28{padding:28px;}.p32{padding:32px;}
.hidden{display:none!important;}
.calcbox{background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.13);border-radius:10px;padding:15px;margin-top:14px;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;}

/* SIDEBAR OVERLAY MOBILE */
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}
.sov.show{display:block;}

/* SEARCH BOX */
.search-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.2);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;outline:none;width:220px;}
.search-box:focus{border-color:rgba(255,215,0,0.5);}

/* SUMMARY ROW */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,215,0,0.04);border-radius:8px;border:1px solid rgba(255,215,0,0.1);margin-top:10px;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text-faint);}
.empty .eicon{font-size:48px;margin-bottom:12px;}
.empty p{font-size:13px;}

@media(max-width:768px){
  #sb{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .sgrid{grid-template-columns:1fr 1fr;}
  .fr{grid-template-columns:1fr;}
  .pgrid{grid-template-columns:1fr 1fr;}
  #ct{padding:15px 13px;}
  .pt{font-size:14px;}
}
@media(max-width:480px){
  .sgrid{grid-template-columns:1fr;}
  .pgrid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="gbg"></div>
<div class="gorb" style="width:400px;height:400px;background:radial-gradient(circle,rgba(255,215,0,0.05),transparent);left:-100px;top:80px;"></div>
<div class="gorb" style="width:360px;height:360px;background:radial-gradient(circle,rgba(255,140,0,0.04),transparent);right:-80px;bottom:80px;"></div>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="lp">
  <div class="lgb"></div>
  <div class="lo" style="width:340px;height:340px;background:radial-gradient(circle,rgba(255,215,0,0.07),transparent);left:8%;top:30%;transform:translate(-50%,-50%);"></div>
  <div class="lo" style="width:270px;height:270px;background:radial-gradient(circle,rgba(255,140,0,0.05),transparent);right:8%;top:20%;transform:translate(50%,-50%);"></div>
  <div class="lcard">
    <div class="llogo">
      <div class="lcrown">👑</div>
      <div class="ltitle">4king77</div>
      <div class="lsub">ລະບົບຄຸ້ມຄອງຮ້ານເກມ</div>
    </div>
    <div class="card glow p32">
      <div style="color:rgba(255,215,0,0.5);font-size:10px;letter-spacing:2px;text-align:center;margin-bottom:22px;">ກະລຸນາໃສ່ຂໍ້ມູນເຂົ້າລະບົບ</div>
      <div id="lerr" class="lerr hidden"></div>
      <div class="lf">
        <label>ຊື່ຜູ້ໃຊ້</label>
        <div class="liw">
          <span class="lii">👤</span>
          <input id="iu" class="lin" type="text" placeholder="ໃສ່ຊື່ຜູ້ໃຊ້" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>
      <div class="lf">
        <label>ລະຫັດຜ່ານ</label>
        <div class="liw">
          <span class="lii">🔒</span>
          <input id="ip" class="lin" type="password" placeholder="ໃສ່ລະຫັດຜ່ານ" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>
      <button class="btn btn-gold lbtn" id="lbtn" onclick="doLogin()">ເຂົ້າສູ່ລະບົບ →</button>
      
      <div id="shift-warn" class="hidden" style="margin-top:14px;padding:10px 14px;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.35);border-radius:10px;color:#00ff88;font-size:11px;text-align:center;letter-spacing:.5px;">
        🟢 Shift ກຳລັງດຳເນີນຢູ່ — ກະລຸນາ Login ເພື່ອສືບຕໍ່
      </div>

    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="sov" id="sov" onclick="closeSB()"></div>

  <div id="sb">
    <div class="brand">
      <div class="bi">👑</div>
      <div><div class="bn">4king77</div><div class="bs">ສູນຄວບຄຸມ</div></div>
    </div>
    <nav id="snav"></nav>
    <div class="uinfo">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="uav">👤</div>
        <div>
          <div style="font-size:12px;font-weight:700;" id="udis">ຜູ້ບໍລິຫານ</div>
          <div style="font-size:10px;color:rgba(255,215,0,0.55);" id="rdis">ADMIN</div>

const _FB_DEFAULT = {
  dbUrl: 'https://khing-db-default-rtdb.asia-southeast1.firebasedatabase.app',
  apiKey: 'GpcbEurehs79HGOHEZMVCLfS9gDbU7rvy2k8aTL9'
};
let _fbCfg = null;
try { const s = localStorage.getItem(FB_KEY); if(s) _fbCfg = JSON.parse(s); } catch(e){}
if (!_fbCfg) _fbCfg = _FB_DEFAULT;

let _fbListener   = null; // active onValue listener unsubscribe fn
let _saveTimer    = null;

// ============================================================
// SYNC STATUS UI
// ============================================================
function showSyncStatus(status) {
  if (!_syncIndicator) _syncIndicator = document.getElementById('syncind');
  if (!_syncIndicator) return;
  const icons  = { saving:'⏳', saved:'🟢', error:'🔴', loading:'🔄' };
  const colors = { saving:'var(--gold)', saved:'var(--green)', error:'var(--red)', loading:'var(--blue)' };
  const labels = { saving:'ກຳລັງບັນທຶກ...', saved:'Firebase sync ສຳເລັດ', error:'Firebase sync ລົ້ມເຫຼວ', loading:'ກຳລັງດຶງຂໍ້ມູນ...' };
  _syncIndicator.textContent = icons[status] || '☁️';
  _syncIndicator.style.color = colors[status] || 'var(--gold)';
  _syncIndicator.title = labels[status] || '';
}

function isFirebaseConfigured() {
  return _fbCfg && _fbCfg.dbUrl && _fbCfg.apiKey;
}

// ============================================================
// DB HASH — change detection
// ============================================================
function dbHash() {
  const str = JSON.stringify(DB);
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return h.toString();
}

// ============================================================
// FIREBASE REST API HELPERS
// ============================================================
function fbUrl(path) {
  return `${_fbCfg.dbUrl.replace(/\/$/, '')}/${path}.json?auth=${_fbCfg.apiKey}`;
}

async function fbRead(path) {
  const r = await fetch(fbUrl(path), { method: 'GET' });
  if (!r.ok) throw new Error('fbRead HTTP ' + r.status);
  return r.json();
}

async function fbWrite(path, data) {
  const r = await fetch(fbUrl(path), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error('fbWrite HTTP ' + r.status);
  return r.json();
}

// ============================================================
// BROADCAST CHANNEL — instant sync ລະຫວ່າງ tabs ດຽວກັນ
// ============================================================
let _bc = null;
function initBroadcast() {
  try {
    _bc = new BroadcastChannel('4king77_realtime');
    _bc.onmessage = function(e) {
      if (!SESSION || !SESSION.user) return;
      if (e.data && e.data.type === 'db_update' && e.data.db) {
        const incoming = JSON.stringify(e.data.db);
        if (incoming !== JSON.stringify(DB)) {
          Object.assign(DB, e.data.db);
          _lastSavedHash = dbHash();
          localStorage.setItem(SK, JSON.stringify(DB));
          navigate(SESSION.page);
          updateBadge();
          showRTIndicator();
        }
      }
    };
  } catch(e) { _bc = null; }
}
function broadcastUpdate() {
  if (_bc) try { _bc.postMessage({ type:'db_update', db: JSON.parse(JSON.stringify(DB)) }); } catch(e) {}
}

// ============================================================
// RT INDICATOR — flash dot ໃນ topbar
// ============================================================
function showRTIndicator() {
  const el = document.getElementById('rt-dot');
  if (!el) return;
  el.style.opacity = '1';
  el.style.transform = 'scale(1.6)';
  el.style.background = 'var(--green)';
  setTimeout(() => { el.style.opacity = '0.6'; el.style.transform = 'scale(1)'; }, 700);
  showToast('⚡ Real-Time ອັບເດດແລ້ວ');
}

// ============================================================
// FIREBASE LONG-POLLING  (SSE-style via repeated GET)
// Every 2s check — Firebase free tier doesn't support WebSocket
// from plain HTML but REST polling at 2s gives near-realtime UX
// ============================================================
let _pollSig = '';
async function pollFirebase() {
  if (!isFirebaseConfigured() || !SESSION || !SESSION.user) return;
  try {
    const data = await fbRead('4king77');
    if (!data) return;
    const incoming = JSON.stringify(data);
    const sig = incoming.length + '_' + (data.actLogs?.[0]?.id || '');
    if (_pollSig !== '' && sig !== _pollSig && incoming !== JSON.stringify(DB)) {
      Object.assign(DB, data);
      _lastSavedHash = dbHash();
      localStorage.setItem(SK, JSON.stringify(DB));
      broadcastUpdate();
      navigate(SESSION.page);
      updateBadge();
      showRTIndicator();
    }
    _pollSig = sig;
    showSyncStatus('saved');
  } catch(e) { /* silent — offline ok */ }
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  // ດຶງ Firebase ກ່ອນສະເໝີ (ຮັບປະກັນ users/passwords ລ່າສຸດ)
  if (isFirebaseConfigured()) {
    try {
      showSyncStatus('loading');
      const data = await fbRead('4king77');
      if (data) {
        localStorage.setItem(SK, JSON.stringify(data));
        showSyncStatus('saved');
        return data;
      }
    } catch(e) {
      showSyncStatus('error');
      // Fallback to localStorage if Firebase fails
      try { const d = localStorage.getItem(SK); if (d) return JSON.parse(d); } catch(e2) {}
    }
    return null;
  }
  // ບໍ່ມີ Firebase — ໃຊ້ localStorage
  try { const d = localStorage.getItem(SK); if (d) return JSON.parse(d); } catch(e) {}
  return null;
}

// ============================================================
// SAVE DATA  (debounced 800ms)
// ============================================================
function saveData() {
  try { localStorage.setItem(SK, JSON.stringify(DB)); } catch(e) {}
  broadcastUpdate();

  const currentHash = dbHash();
  if (!isFirebaseConfigured()) return;
  if (currentHash === _lastSavedHash) return;

  showSyncStatus('saving');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (_isSaving) { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveData, 800); return; }
    _isSaving = true;
    const h = dbHash();
    try {
      await fbWrite('4king77', DB);
      _lastSavedHash = h;
      showSyncStatus('saved');
    } catch(e) {
      showSyncStatus('error');
      showToast('⚠ Firebase sync ລົ້ມເຫຼວ', 'error');
    } finally { _isSaving = false; }
  }, 800);
}

// ============================================================
// START REAL-TIME ENGINE
// ============================================================
function startPolling() {
  initBroadcast();
  if (isFirebaseConfigured()) {
    setInterval(pollFirebase, 2000); // 2s poll = near-realtime on free tier
  }
}

function autoFixStaleShifts(){
  // Shift ຄ້າງ = endTime null ແຕ່ເປີດໄວ້ > 24 ຊົ່ວໂມງ (ບໍ່ແມ່ນຂອງ session ນີ້)
  const now = Date.now();
  const saved = loadShiftState();
  const activeId = saved ? saved.shiftLogId : null;

  let fixed = 0;
  DB.shiftLogs.forEach(s => {
    if(s.endTime) return; // ປິດແລ້ວ OK
    if(s.id === activeId) return; // session ປັດຈຸບັນ OK
    // ຄຳນວນ age ຈາກ date + startTime
    try{
      const dt = new Date(s.date + 'T' + (s.startTime||'00:00') + ':00');
      const age = (now - dt.getTime()) / 3600000; // hours
      if(age > 24){
        s.endTime  = s.startTime || '00:00'; // ປິດດ້ວຍ startTime (ບໍ່ຮູ້ closing)
        s.hours    = 0;
        s.staleAuto = true; // flag ວ່າ auto-closed
        fixed++;
      }
    }catch(e){}
  });
  if(fixed > 0){ saveData(); console.log('[SHIFT] auto-closed', fixed, 'stale shifts'); }
}

function restoreShiftIfNeeded(){
  const saved = loadShiftState();
  console.log('[SHIFT RESTORE] saved state:', saved);
  if(!saved){ console.log('[SHIFT RESTORE] no saved state'); return; }
  if(saved.username !== SESSION.user.username){
    console.log('[SHIFT RESTORE] username mismatch:', saved.username, '!=', SESSION.user.username);
    return;
  }
  const start = Number(saved.shiftStart);
  if(!start){ console.log('[SHIFT RESTORE] invalid start time'); return; }
  SESSION.shiftActive  = true;
  SESSION.shiftStart   = start;
  SESSION.shiftLogId   = saved.shiftLogId || null;
  SESSION.shiftOpenBal = saved.shiftOpenBal || 0;
  SESSION.shiftElapsed = Math.floor((Date.now() - start) / 1000);
  console.log('[SHIFT RESTORE] success! elapsed:', SESSION.shiftElapsed, 's');
  // ໝັ້ນໃຈ employee status = ONLINE
  const e = DB.employees.find(x=>x.username===SESSION.user.username||x.name===SESSION.user.name);
  if(e && e.status!=='ONLINE'){ e.status='ONLINE'; saveData(); }
}

function ringHTML(value,max,size,label,color){
  const pct=Math.min(value/(max||1),1), r=(size-12)/2;
  const circ=2*Math.PI*r, dash=circ*pct, cx=size/2, cy=size/2;
  return `<div class="rw" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" style="display:block;">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="7"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
        stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}"
        stroke-linecap="round" style="filter:drop-shadow(0 0 5px ${color});"/>
    </svg>
    <div class="rl"><span class="rp" style="color:${color}">${Math.round(pct*100)}%</span><span class="rn">${label}</span></div>
  </div>`;
}

}

// ── week helpers ────────────────────────────────────────────
function getMondayOf(d){
  const dt = new Date(d);
  const dow = dt.getDay()===0 ? 6 : dt.getDay()-1;
  dt.setDate(dt.getDate()-dow);
  return dt.toISOString().slice(0,10);
}
function getSundayOf(mondayStr){
  const d = new Date(mondayStr);
  d.setDate(d.getDate()+6);
  return d.toISOString().slice(0,10);
}
function currentIsoWeek(){
  // returns YYYY-Www for current week
  const d = new Date();
  const td = d.toISOString().slice(0,10);
  const mon = getMondayOf(d);
  const jan4 = new Date(d.getFullYear(),0,4);
  const w = Math.ceil((((d-jan4)/86400000)+jan4.getDay()+1)/7);
  return d.getFullYear()+'-W'+String(w).padStart(2,'0');
}
function isoWeekVal(mondayStr){
  // convert YYYY-MM-DD monday → YYYY-Www for <input type=week>
  const d = new Date(mondayStr);
  const jan4 = new Date(d.getFullYear(),0,4);
  const w = Math.ceil((((d-jan4)/86400000)+jan4.getDay()+1)/7);
  return d.getFullYear()+'-W'+String(w).padStart(2,'0');
}
function onDbWeekChange(val){
  // val = "YYYY-Www" → find Monday
  if(!val) return;
  const [yr,wStr] = val.split('-W');
  const wn = parseInt(wStr);
  // Jan 4 is always in week 1
  const jan4 = new Date(parseInt(yr),0,4);
  const dow4 = jan4.getDay()===0?6:jan4.getDay()-1;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - dow4 + (wn-1)*7);
  _dbWeekStart = monday.toISOString().slice(0,10);
  renderDashboard();
}

function getDbRange(){
  const td  = today();
  const now = new Date();
  if(_dbPeriod==='all'){
    const allDates = [...DB.revenues.map(r=>r.date||td),...DB.expenses.map(e=>e.date||td)].filter(Boolean).sort();
    const from = allDates[0] || td.slice(0,4)+'-01-01';
    return {from, to:td, label:'ທັງໝົດ'};
  }
  if(_dbPeriod==='day'){
    const d  = _dbDaySelect || td;
    const dn = new Date(d);
    const label = d===td ? 'ມື້ນີ້' : `${dn.getDate()}/${dn.getMonth()+1}/${dn.getFullYear()}`;
    return {from:d, to:d, label};
  }
  if(_dbPeriod==='week'){
    const mon = _dbWeekStart || getMondayOf(now);
    const sun = getSundayOf(mon);
    const monD = new Date(mon);
    const isCurrentWeek = mon === getMondayOf(now);
    const label = isCurrentWeek ? 'ອາທິດນີ້'
      : `${monD.getDate()}/${monD.getMonth()+1} – ${new Date(sun).getDate()}/${new Date(sun).getMonth()+1}`;
    return {from:mon, to:sun>td?td:sun, label};
  }
  // month
  const m  = _dbMonthSel || td.slice(0,7);
  const [yr,mn] = m.split('-');
  const lastDay = new Date(parseInt(yr), parseInt(mn), 0).getDate();
  const mEnd = `${m}-${String(lastDay).padStart(2,'0')}`;
  const isCurrentMonth = m === td.slice(0,7);
  const monthNames = ['','ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];
  const label = isCurrentMonth ? 'ເດືອນນີ້' : `${monthNames[parseInt(mn)]} ${yr}`;
  return {from:`${m}-01`, to:mEnd>td&&isCurrentMonth?td:mEnd, label};
}

      groups = buckets.map((l,i)=>({l, rev:0, exp:0}));
      revFiltered.forEach(r=>{ /* no hour data — just show by employee */ });
      // show by employee instead
      const empMap={};
      revFiltered.forEach(r=>{ empMap[r.empName]=(empMap[r.empName]||0)+r.amount; });
      expFiltered.forEach(e=>{ /* lump as 'ລາຍຈ່າຍ' */ });
      const empEntries = Object.entries(empMap);
      const expTotal = expFiltered.reduce((a,b)=>a+b.amount,0);
      const allEntries = [...empEntries.map(([n,v])=>({l:n,rev:v,exp:0}))];
      if(expTotal>0) allEntries.push({l:'ລາຍຈ່າຍ',rev:0,exp:expTotal});
      groups = allEntries.length>0 ? allEntries : [{l:'ບໍ່ມີ',rev:0,exp:0}];
    } else if(_dbPeriod==='week'){
      const days=['ຈ','ອ','ພ','ພຫ','ສ','ເສ','ອາ'];
      const now2=new Date();
      for(let i=0;i<7;i++){
        const d=new Date(from); d.setDate(d.getDate()+i);
        if(d>now2) break;
        const ds=d.toISOString().slice(0,10);
        const dow=d.getDay()===0?6:d.getDay()-1;
        const rv=DB.revenues.filter(r=>r.date===ds).reduce((a,b)=>a+b.amount,0);
        const ex=DB.expenses.filter(e=>e.date===ds).reduce((a,b)=>a+b.amount,0);
        groups.push({l:days[dow],rev:rv,exp:ex});
      }
    } else {
      // month — group by week
      for(let w=1;w<=5;w++){
        const wStart=new Date(from); wStart.setDate((w-1)*7+1);
        const wEnd=new Date(from); wEnd.setDate(w*7);
        const ws=wStart.toISOString().slice(0,10);
        const we=wEnd.toISOString().slice(0,10);
        const rv=DB.revenues.filter(r=>r.date>=ws&&r.date<=we&&r.date.startsWith(from.slice(0,7))).reduce((a,b)=>a+b.amount,0);
        const ex=DB.expenses.filter(e=>e.date>=ws&&e.date<=we&&e.date.startsWith(from.slice(0,7))).reduce((a,b)=>a+b.amount,0);
        if(rv>0||ex>0) groups.push({l:'W'+w,rev:rv,exp:ex});
      }
    }

    const maxV = Math.max(...groups.map(g=>Math.max(g.rev,g.exp)),1);
    const H=90;
    barWrap.innerHTML=`
    <div style="display:flex;align-items:flex-end;gap:6px;height:${H+30}px;padding-bottom:22px;position:relative;">
      <!-- Y axis line -->
      <div style="position:absolute;left:0;top:0;bottom:22px;width:1px;background:rgba(255,255,255,0.06);"></div>
      ${groups.map(g=>`
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:${H+22}px;justify-content:flex-end;">
        <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:${H}px;">
          <div style="flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#FFD700,#FF8C00);min-height:2px;height:${Math.max(2,(g.rev/maxV)*H)}px;box-shadow:0 0 6px rgba(255,215,0,0.3);transition:height .4s;position:relative;" title="${fmt(g.rev)}">
            ${g.rev>0?`<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--gold);white-space:nowrap;">${(g.rev/1000000).toFixed(1)}M</div>`:''}
          </div>
          <div style="flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#ff4455,#cc2233);min-height:2px;height:${Math.max(2,(g.exp/maxV)*H)}px;box-shadow:0 0 6px rgba(255,68,85,0.3);transition:height .4s;position:relative;" title="${fmt(g.exp)}">

          </div>
        </div>
        <div style="font-size:9px;color:var(--text-faint);margin-top:3px;">${g.l}</div>
      </div>`).join('')}
    </div>

      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);">

function updateRevPreview(){
  const dep = Number(document.getElementById('rv-dep')?.value)||0;
  const wth = Number(document.getElementById('rv-wth')?.value)||0;
  const prz = Number(document.getElementById('rv-prz')?.value)||0;
  const net = dep - wth - prz;

  const s = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  s('rpv-val-0', fmt(dep));
  s('rpv-val-1', fmt(wth));
  s('rpv-val-2', fmt(prz));

  const netEl = document.getElementById('rpv-net');
  if(netEl){ netEl.textContent=fmt(net); netEl.style.color=net>=0?'var(--green)':'var(--red)'; }

  const selDate = document.getElementById('rv-date')?.value || today();
  const dateRevs = DB.revenues.filter(r=>r.date===selDate);
  const depCnt = document.getElementById('rpv-cnt-dep');
  const wthCnt = document.getElementById('rpv-cnt-wth');
  if(depCnt) depCnt.textContent = dateRevs.length + (dep>0?1:0);
  if(wthCnt) wthCnt.textContent = dateRevs.filter(r=>(r.withdraw||0)>0).length + (wth>0?1:0);
  // hide commission in footer since not used
  const cm3 = document.getElementById('rpv-val-3');
  if(cm3) cm3.parentElement.style.display='none';
}

function addRev(){
  const date=document.getElementById('rv-date').value;
  const empSel=document.getElementById('rv-emp');
  const rawVal = empSel.value;
  const empId = rawVal.startsWith('a_') ? rawVal : Number(rawVal);
  const empName=empSel.options[empSel.selectedIndex].dataset.name || empSel.options[empSel.selectedIndex].text.replace(' (Admin)','');
  const deposit=Number(document.getElementById('rv-dep').value)||0;
  const withdraw=Number(document.getElementById('rv-wth').value)||0;
  const prize=Number(document.getElementById('rv-prz').value)||0;
  const bonus=0;
  const amount=deposit; // ລາຍຮັບ = ຍອດຝາກ
  const notes=document.getElementById('rv-nt').value;
  if(!deposit){ showToast('ກະລຸນາໃສ່ຍອດຝາກ','error'); return; }
  DB.revenues.unshift({id:uid(),date,empId,empName,amount,deposit,withdraw,prize,bonus,notes,shiftReport:false});
  addLog(SESSION.user.name,`ບັນທຶກລາຍຮັບ ${fmt(amount)} (${empName})`, 'revenue');
  addNotif(`${empName} ບັນທຶກລາຍຮັບ ${fmt(amount)}`,'revenue');
  saveData();
  document.getElementById('rv-amt').value='';
  document.getElementById('rv-dep').value='';
  document.getElementById('rv-wth').value='';
  document.getElementById('rv-prz').value='';
  document.getElementById('rv-bon').value='';
  document.getElementById('rv-nt').value='';
  renderRevTable();
  showToast('ບັນທຶກລາຍຮັບສຳເລັດ');
}

function filterRevTable(q){ renderRevTable(q); }

function renderRevTable(q){
  const isAdmin=SESSION.user.role==='admin';
  const filter=document.getElementById('rv-filter')?.value||'';
  const search=(q||document.getElementById('rv-search')?.value||'').toLowerCase();
  let rows=DB.revenues;
  if(!isAdmin) rows=rows.filter(r=>r.empId===SESSION.user.id||r.empName===SESSION.user.name);
  if(filter==='today') rows=rows.filter(r=>r.date===today());
  if(filter==='month') rows=rows.filter(r=>r.date.startsWith(today().slice(0,7)));
  if(search) rows=rows.filter(r=>r.empName.toLowerCase().includes(search)||r.notes.toLowerCase().includes(search)||r.date.includes(search));

  const tb=document.getElementById('rv-tbody'); if(!tb) return;
  if(rows.length===0){ tb.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--text-faint);">ບໍ່ມີຂໍ້ມູນ</td></tr>`; return; }

  tb.innerHTML=rows.map(r=>{
    const net=(r.deposit||0)-(r.withdraw||0)-(r.prize||0);
    const t=getCommTier(net);
    const comm=net*t.rate/100;
    return `<tr>
      <td class="td">${r.date}</td>
      <td class="tg bold">${r.empName}</td>
      <td class="tgr" title="ສ່ວນຕ່າງ = ຝາກ−ຖອນ−ຄ່າທຳນຽມ">${fmt(net)}</td>
      <td class="td">${fmt(r.deposit)}</td>
      <td class="td">${fmt(r.withdraw)}</td>
      <td class="td">${fmt(r.prize)}</td>
      <td class="to">${fmt(comm)} (${t.rate}%)</td>
      <td class="td">${r.notes||'-'}</td>
      ${isAdmin?`<td><button class="btn btn-red" style="font-size:11px;padding:5px 9px;" onclick="delRev(${r.id})">✕</button></td>`:''}
    </tr>`;
  }).join('');

  const total=rows.reduce((a,b)=>a+((b.deposit||0)-(b.withdraw||0)-(b.prize||0)),0);
  const totalComm=rows.reduce((a,b)=>{ const n=(b.deposit||0)-(b.withdraw||0)-(b.prize||0); return a+n*getCommTier(n).rate/100; },0);
  document.getElementById('rv-summary').innerHTML=`
  <div class="sum-row">
    <span class="td">ລວມ ${rows.length} ລາຍການ</span>
    <span style="display:flex;gap:24px;">
      <span>ລາຍຮັບ: <span class="tg bold">${fmt(total)}</span></span>
      <span>Commission: <span class="to bold">${fmt(totalComm)}</span></span>
    </span>
  </div>`;
}

function delRev(id){
  if(!confirm('ລຶບລາຍການນີ້ແທ້ບໍ?')) return;
  DB.revenues=DB.revenues.filter(x=>x.id!==id);
  addLog(SESSION.user.name,'ລຶບລາຍການລາຍຮັບ','revenue');
  saveData();
  renderRevTable();
  showToast('ລຶບແລ້ວ');
}

function toggleEmpEdit(id){
  const panel = document.getElementById('emp-edit-'+id);
  if(!panel) return;
  panel.classList.toggle('hidden');
  // scroll to it
  if(!panel.classList.contains('hidden')){
    setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }
}

function resetField(inputId, val){
  const el = document.getElementById(inputId);
  if(el){ el.value = val; el.dispatchEvent(new Event('input')); }
}

function resetEmpStats(id){
  DB.employees = DB.employees.map(e=>e.id===id?{...e, commission:0, score:0}:e);
  addLog(SESSION.user.name, `Reset Commission+ຄະແນນ: ${DB.employees.find(x=>x.id===id)?.name||''}`, 'settings');
  saveData();
  renderEmpList();
  showToast('Reset Commission ແລະ ຄະແນນ ສຳເລັດ');
}

function saveEmp(id){
  if(id){
    // inline edit — read from inline inputs
    const name     = (document.getElementById('ef-n-'+id)?.value||'').trim();
    const username = (document.getElementById('ef-u-'+id)?.value||'').trim();
    const pw       = document.getElementById('ef-pw-'+id)?.value||'';
    if(!name){ showToast('ໃສ່ຊື່ພະນັກງານ','error'); return; }
    const data = {
      name, username,
      shift:      document.getElementById('ef-s-'+id)?.value||'',
      phone:      document.getElementById('ef-ph-'+id)?.value||'',
      status:     document.getElementById('ef-st-'+id)?.value||'OFFLINE',
      salary:     Number(document.getElementById('ef-sal-'+id)?.value)||0,
      commission: Number(document.getElementById('ef-cm-'+id)?.value)||0,
      target:     Number(document.getElementById('ef-tg-'+id)?.value)||0,
      score:      Math.min(100,Math.max(0,Number(document.getElementById('ef-sc-'+id)?.value)||0)),
    };
    DB.employees = DB.employees.map(e=>e.id===id?{...e,...data}:e);
    // sync user account password
    if(pw && username){
      const ui = DB.users.findIndex(u=>u.username===username||u.name===name);
      if(ui>=0){ DB.users[ui].password=pw; DB.users[ui].name=name; DB.users[ui].username=username; }
    } else if(username){
      // update username/name in users
      const ui = DB.users.findIndex(u=>u.username===DB.employees.find(x=>x.id===id)?.username||u.name===DB.employees.find(x=>x.id===id)?.name);
      if(ui>=0){ DB.users[ui].name=name; DB.users[ui].username=username; }
    }
    addLog(SESSION.user.name, `ແກ້ໄຂພະນັກງານ: ${name} (comm:${data.commission}% score:${data.score})`, 'settings');
    saveData();
    showToast(`✅ ບັນທຶກ ${name} ສຳເລັດ`);
    renderEmpList();
  } else {
    // new employee — read from modal inputs
    const name     = (document.getElementById('ef-n')?.value||'').trim();
    const username = (document.getElementById('ef-u')?.value||'').trim();
    const pw       = document.getElementById('ef-pw')?.value||'';
    if(!name){ showToast('ໃສ່ຊື່ພະນັກງານ','error'); return; }
    if(!pw && username){ showToast('ໃສ່ລະຫັດຜ່ານ','error'); return; }
    const eid = uid();
    DB.employees.push({
      id:eid, name, username,
      shift:      document.getElementById('ef-s')?.value||'',
      phone:      document.getElementById('ef-ph')?.value||'',
      status:     'OFFLINE',
      salary:     Number(document.getElementById('ef-sal')?.value)||4000000,
      commission: Number(document.getElementById('ef-cm')?.value)||5,
      target:     Number(document.getElementById('ef-tg')?.value)||2000000,
      score:      75,
    });
    if(username){
      DB.users.push({id:uid(), username, password:pw||username, name, role:'staff'});
    }
    addLog(SESSION.user.name, `ເພີ່ມພະນັກງານ: ${name}`, 'settings');
    saveData();
    closeModal();
    showToast(`✅ ເພີ່ມ ${name} ສຳເລັດ`);
    renderEmpList();
  }
}

function delEmp(id){
  const e=DB.employees.find(x=>x.id===id);
  if(!e||!confirm(`ລຶບ "${e.name}" ອອກຈາກລະບົບທັງໝົດ?`)) return;
  DB.employees=DB.employees.filter(x=>x.id!==id);
  // remove user account too
  DB.users=DB.users.filter(u=>u.username!==e.username&&u.name!==e.name);
  addLog(SESSION.user.name,`ລຶບພະນັກງານ: ${e.name}`,'settings');
  saveData(); renderEmpList(); showToast(`ລຶບ ${e.name} ສຳເລັດ`);
}

function renderShiftLogs(){
  const tb  = document.getElementById('shift-log-tbody'); if(!tb) return;
  const isAdmin = SESSION.user.role==='admin';
  const empF  = isAdmin ? (document.getElementById('shift-emp-filter')?.value||'') : SESSION.user.name;
  const monthF = document.getElementById('shift-month-filter')?.value||today().slice(0,7);

  let logs = [...DB.shiftLogs];
  if(empF)   logs = logs.filter(s=>s.empName===empF);
  if(monthF) logs = logs.filter(s=>(s.date||'').startsWith(monthF));

  if(logs.length===0){
    tb.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-faint);">ບໍ່ມີບັນທຶກ Shift</td></tr>`;
    document.getElementById('shift-log-sum').innerHTML='';
    return;
  }

  tb.innerHTML = logs.map(s=>{
    const dep2 = (s.closeBalance!=null&&s.openBalance!=null) ? s.closeBalance-s.openBalance : null;
    return `<tr>
    <td class="td fm" style="font-size:11px;">${s.date}</td>
    <td class="tg bold">${s.empName}</td>
    <td class="td">${s.startTime||'-'}</td>
    <td class="td">${s.endTime ? s.endTime : s.staleAuto ? '<span style="color:var(--red);font-size:10px;">ຄ້າງ(auto)</span>' : '<span style="color:var(--green);font-size:10px;">ດຳເນີນ</span>'}</td>
    <td class="tgr">${s.hours?s.hours.toFixed(1)+'h':'-'}</td>
    <td class="td" style="font-size:11px;">${s.openBalance!=null?fmt(s.openBalance):'-'}</td>
    <td class="td" style="font-size:11px;">${s.closeBalance!=null?fmt(s.closeBalance):'-'}</td>
    <td class="tg" style="font-weight:700;">${s.revenue!=null?fmt(s.revenue):'-'}</td>
    <td>
      ${s.endTime
        ? `<button class="btn btn-blue" style="font-size:10px;padding:5px 10px;white-space:nowrap;" onclick="exportShiftImage(${s.id})">📸 ຮູບ</button>`
        : `<span style="font-size:10px;color:var(--green);">ດຳເນີນ</span>`}
    </td>
    ${isAdmin ? `<td style="white-space:nowrap;">
      <button class="btn" style="font-size:10px;padding:4px 8px;margin-right:3px;border-color:rgba(255,165,0,0.5);color:var(--gold2);" onclick="adminEditShift('${s.id}')">✏ແກ້</button>
      <button class="btn btn-red" style="font-size:10px;padding:4px 8px;" onclick="adminDeleteShift('${s.id}')">✕ລົບ</button>
    </td>` : ''}
  </tr>`;}).join('');

  const totHours = logs.filter(s=>s.hours).reduce((a,b)=>a+(b.hours||0),0);
  const totRev   = logs.reduce((a,b)=>a+(b.revenue||0),0);
  const sm = document.getElementById('shift-log-sum');
  if(sm) sm.innerHTML=`<div class="sum-row" style="margin-top:8px;">
    <span class="td">${logs.length} Shift · ລວມ ${totHours.toFixed(1)}h</span>
    <span class="tg bold">${fmt(totRev)}</span>
  </div>`;
}

function addQuickRev(){
  const amt=Number(document.getElementById('sq-amt').value)||0;
  if(!amt){ showToast('ໃສ່ຈຳນວນລາຍຮັບ','error'); return; }
  const dep=Number(document.getElementById('sq-dep').value)||0;
  const wth=Number(document.getElementById('sq-wth').value)||0;
  const prz=Number(document.getElementById('sq-prz').value)||0;
  const nt=document.getElementById('sq-nt').value||'ບັນທຶກລະຫວ່າງ Shift';
  DB.revenues.unshift({id:uid(),date:today(),empId:SESSION.user.id,empName:SESSION.user.name,amount:amt,deposit:dep,withdraw:wth,prize:prz,bonus:0,notes:nt,shiftReport:false});
  addLog(SESSION.user.name,`ບັນທຶກລາຍຮັບ ${fmt(amt)} ລະຫວ່າງ Shift`,'revenue');
  saveData();
  ['sq-amt','sq-dep','sq-wth','sq-prz','sq-nt'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showToast(`ບັນທຶກລາຍຮັບ ${fmt(amt)} ສຳເລັດ`);
}

function confirmStartShift(){
  const openBal = Number(document.getElementById('ob-val')?.value)||0;
  closeModal();

  // ⚠ ກວດ Shift ຄ້າງ — ຫ້າມເປີດຊ້ຳ
  const openShift = DB.shiftLogs.find(s => s.empId === SESSION.user.id && !s.endTime);
  if(openShift){
    showModal('⚠ ມີ Shift ຄ້າງຢູ່',`
      <div style="text-align:center;padding:10px 0 18px;">
        <div style="font-size:40px;margin-bottom:8px;">⚠️</div>
        <div style="font-size:14px;color:var(--text-dim);margin-bottom:12px;">ທ່ານມີ Shift ທີ່ຍັງບໍ່ໄດ້ປິດ</div>
        <div style="background:rgba(255,68,85,0.08);border:1px solid rgba(255,68,85,0.25);border-radius:10px;padding:12px;font-size:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="color:var(--text-dim);">ວັນທີ</span>
            <span>${openShift.date} ${openShift.startTime}</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--text-dim);">ID</span>
            <span style="color:var(--gold);font-size:10px;">#${openShift.id}</span>
          </div>
        </div>
        <div style="margin-top:14px;font-size:11px;color:var(--text-dim);">ຕ້ອງປິດ Shift ເກົ່າກ່ອນ ຈື່ງເລີ່ມໃໝ່ໄດ້</div>
      </div>`,
      [{label:'◀ ກັບໄປປິດ Shift',cls:'btn btn-gold',fn:closeModal},
       {label:'🗑 ລຶບ Shift ຄ້າງ & ເລີ່ມໃໝ່',cls:'btn btn-red',fn:()=>{ closeModal(); forceCloseStaleShift(openShift.id, openBal); }}]
    );
    return;
  }

  SESSION.shiftActive=true;
  SESSION.shiftStart=Date.now()-SESSION.shiftElapsed*1000;
  SESSION.shiftOpenBal=openBal;
  const e=DB.employees.find(x=>x.username===SESSION.user.username||x.name===SESSION.user.name);
  if(e){ e.status='ONLINE'; saveData(); }
  // record shift log start
  SESSION.shiftLogId=uid();
  DB.shiftLogs.unshift({id:SESSION.shiftLogId,date:today(),empName:SESSION.user.name,empId:SESSION.user.id,startTime:nowTime(),endTime:null,hours:null,revenue:0,openBalance:openBal,closeBalance:null});
  addLog(SESSION.user.name,`ເລີ່ມ Shift (ຍອດຍົກມາ: ${fmt(openBal)})`,'shift');
  saveData();
  saveShiftState();
  pgShift();
}

function forceCloseStaleShift(staleId, newOpenBal){
  // ລຶບ shift ຄ້າງອອກ
  DB.shiftLogs = DB.shiftLogs.filter(s => s.id !== staleId);
  addLog(SESSION.user.name, 'ລຶບ Shift ຄ້າງ #'+staleId, 'shift');
  saveData();
  localStorage.removeItem(SHIFT_KEY);
  SESSION.shiftActive  = false;
  SESSION.shiftElapsed = 0;
  SESSION.shiftLogId   = null;
  SESSION.shiftOpenBal = 0;
  // ເລີ່ມ shift ໃໝ່
  document.getElementById('ob-val') // ob-val ອາດຫາຍໄປແລ້ວ ສ້າງ input ໃໝ່ໂດຍກົງ
  const fakeInput = { value: String(newOpenBal) };
  const _orig = document.getElementById.bind(document);
  const _patch = (id) => id === 'ob-val' ? fakeInput : _orig(id);
  const _get = document.getElementById;
  document.getElementById = _patch;
  confirmStartShift_direct(newOpenBal);
  document.getElementById = _get;
}

function confirmStartShift_direct(openBal){
  SESSION.shiftActive  = true;
  SESSION.shiftStart   = Date.now() - SESSION.shiftElapsed*1000;
  SESSION.shiftOpenBal = openBal;
  const e = DB.employees.find(x=>x.username===SESSION.user.username||x.name===SESSION.user.name);
  if(e){ e.status='ONLINE'; saveData(); }
  SESSION.shiftLogId = uid();
  DB.shiftLogs.unshift({id:SESSION.shiftLogId,date:today(),empName:SESSION.user.name,empId:SESSION.user.id,startTime:nowTime(),endTime:null,hours:null,revenue:0,openBalance:openBal,closeBalance:null});
  addLog(SESSION.user.name,`ເລີ່ມ Shift ໃໝ່ (ຍອດຍົກມາ: ${fmt(openBal)})`,'shift');
  saveData();
  saveShiftState();
  pgShift();
}

function resumeShiftTimer(){
  if(SESSION.shiftInterval) clearInterval(SESSION.shiftInterval);
  SESSION.shiftInterval=setInterval(()=>{
    SESSION.shiftElapsed=Math.floor((Date.now()-SESSION.shiftStart)/1000);
    const el=document.getElementById('sti'); if(el) el.textContent=fmtT(SESSION.shiftElapsed);
  },1000);
}

    <div class="fgr"><label>ບັນຫາ / ໝາຍເຫດ</label><textarea id="sr-n" rows="2" placeholder="ອະທິບາຍ..."></textarea></div>
    `,
    [{label:'📤 ບັນທຶກ & ປິດ Shift',cls:'btn btn-gold',fn:submitShiftReport},{label:'ຍົກເລີກ',cls:'btn btn-outline',fn:closeModal}]
  );
  setTimeout(updateShiftPreview, 50);
}

function updateShiftPreview(){
  const openBal = SESSION.shiftOpenBal||0;
  const close   = Number(document.getElementById('sr-close')?.value)||0;  // ຍອດປິດ
  const wth     = Number(document.getElementById('sr-w')?.value)||0;       // ຍອດຖອນ
  const prz     = Number(document.getElementById('sr-p')?.value)||0;       // ຄ່າທຳນຽມ
  // ຍອດເຕີມ = ປິດ − ເປີດ (ຍອດທີ່ເຂົ້າລະຫວ່າງກະ)
  const dep     = close - openBal;
  // ສ່ວນຕ່າງ = ເຕີມ − ຖອນ − ຄ່າທຳນຽມ
  const net     = dep - wth - prz;

  const s = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  s('sp-dep',  fmt(Math.max(dep,0)));
  s('sp-wth',  fmt(wth));
  s('sp-rev',  fmt(close));
  s('sp-prz',  fmt(prz));

  const ne = document.getElementById('sp-net');
  if(ne){ ne.textContent=fmt(net); ne.style.color=net>=0?'var(--green)':'var(--red)'; }

  const cm = document.getElementById('sp-comm');
  if(cm) cm.parentElement.style.display='none';
}

function submitShiftReport(){
  const openBal = SESSION.shiftOpenBal||0;
  const close   = Number(document.getElementById('sr-close')?.value)||0;
  const wth     = Number(document.getElementById('sr-w').value)||0;
  const prz     = Number(document.getElementById('sr-p').value)||0;
  const dep     = close - openBal;   // ຍອດເຕີມ = ປິດ − ເປີດ
  const rev     = dep - wth - prz;   // ສ່ວນຕ່າງ

  // ⚠ ສ່ວນຕ່າງຕິດລົບ = ລູກຄ້າຖອນຫຼາຍກວ່າຝາກ → ຢືນຢັນກ່ອນ
  if(rev < 0 && !window._shiftNegConfirmed){
    window._shiftNegConfirmed = true;
    showModal('⚠ ສ່ວນຕ່າງຕິດລົບ',`
      <div style="text-align:center;padding:10px 0 18px;">
        <div style="font-size:42px;margin-bottom:8px;">📉</div>
        <div style="font-size:22px;font-weight:900;color:var(--red);margin-bottom:6px;">${fmt(rev)}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px;">ລູກຄ້າຖອນຫຼາຍກວ່າຝາກໃນກະນີ້</div>
        <div style="display:flex;flex-direction:column;gap:6px;background:rgba(255,68,85,0.06);border:1px solid rgba(255,68,85,0.2);border-radius:10px;padding:12px;font-size:12px;text-align:left;">
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-dim);">ຍອດເຕີມ</span><span style="color:var(--green);">${fmt(Math.max(dep,0))}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-dim);">ຍອດຖອນ</span><span style="color:var(--red);">− ${fmt(wth)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-dim);">ຄ່າທຳນຽມ</span><span style="color:var(--gold3);">− ${fmt(prz)}</span></div>
          <div style="border-top:1px solid rgba(255,255,255,0.08);margin-top:4px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;"><span>ສ່ວນຕ່າງ</span><span style="color:var(--red);">${fmt(rev)}</span></div>
        </div>
        <div style="margin-top:14px;font-size:12px;color:var(--text-dim);">ກວດຄືນຕົວເລກຖືກຕ້ອງແລ້ວໃຊ່ບໍ່?</div>
      </div>`,
      [{label:'✓ ຖືກຕ້ອງ ດຳເນີນຕໍ່',cls:'btn btn-red',fn:()=>{ closeModal(); submitShiftReport(); }},
       {label:'◀ ກັບໄປແກ້ໄຂ',cls:'btn btn-outline',fn:()=>{ window._shiftNegConfirmed=false; closeModal(); tryEndShift(); }}]
    );
    return;
  }
  window._shiftNegConfirmed = false;
  const bon=0;
  const notes=document.getElementById('sr-n').value;
  const amount=Math.max(dep,0);

  // add revenue entry
  if(dep>0||rev>0){
    DB.revenues.unshift({id:uid(),date:today(),empId:SESSION.user.id,empName:SESSION.user.name,amount:amount,deposit:dep,withdraw:wth,prize:prz,bonus:bon,notes:notes||'ລາຍງານ Shift',shiftReport:true});
  }

  // close shift log
  const hours=(SESSION.shiftElapsed || Math.floor((Date.now()-SESSION.shiftStart)/1000))/3600;
  if(SESSION.shiftLogId){
    const idx=DB.shiftLogs.findIndex(s=>s.id===SESSION.shiftLogId);
    if(idx>=0){ DB.shiftLogs[idx].endTime=nowTime(); DB.shiftLogs[idx].hours=hours; DB.shiftLogs[idx].revenue=rev; DB.shiftLogs[idx].closeBalance=close; }
  }

  // update employee status
  const e=DB.employees.find(x=>x.username===SESSION.user.username||x.name===SESSION.user.name);
  if(e){ e.status='OFFLINE'; }

  if(SESSION.shiftInterval){ clearInterval(SESSION.shiftInterval); SESSION.shiftInterval=null; }
  SESSION.shiftActive=false; SESSION.shiftElapsed=0; SESSION.shiftLogId=null;
  saveShiftState(); // clear persisted shift

  addLog(SESSION.user.name,`ສິ້ນສຸດ Shift ລາຍຮັບ ${fmt(rev)}`,'shift');
  addNotif(`${SESSION.user.name} ປິດ Shift ລາຍຮັບ ${fmt(rev)}`,'shift');
  saveData();
  closeModal();
  pgShift();
  showToast('ສົ່ງລາຍງານ Shift ສຳເລັດ');
}

function exportShiftImage(shiftId){
  const s = DB.shiftLogs.find(x=>x.id===shiftId);
  if(!s){ showToast('ຫາ Shift ບໍ່ພົບ','error'); return; }

  // get revenue entries from that shift date + employee
  const revEntries = DB.revenues.filter(r=>
    r.date===s.date && (r.empId===s.empId || r.empName===s.empName)
  );
  const totalRev   = revEntries.reduce((a,b)=>a+b.amount,0);
  const totalDep   = revEntries.reduce((a,b)=>a+(b.deposit||0),0);
  const totalWith  = revEntries.reduce((a,b)=>a+(b.withdraw||0),0);
  const totalPrize = revEntries.reduce((a,b)=>a+(b.prize||0),0);
  const totalBonus = revEntries.reduce((a,b)=>a+(b.bonus||0),0);
  const emp        = DB.employees.find(e=>e.id===s.empId||e.name===s.empName);
  const tier       = getCommTier(totalRev);
  const commission = totalRev * tier.rate / 100;
  const storeName  = DB.settings.storeName || '4king77 Gaming';

  // ── CANVAS SETUP ──────────────────────────────────────────
  const W = 560, PADDING = 30;
  // calculate height dynamically
  const rowH   = 36;
  const rows   = [
    ['ລາຍຮັບທັງໝົດ', fmt(totalRev), '#00ff88'],
    ['ຍອດຝາກ',       fmt(totalDep), '#FFD700'],
    ['ຍອດຖອນ',       fmt(totalWith), '#ff4455'],
    ['ຄ່າທຳນຽມ',       fmt(totalPrize), '#44aaff'],
    ['Bonus',         fmt(totalBonus), '#cc44ff'],
    ['Commission '+tier.rate+'%', fmt(commission), '#FF8C00'],
  ];
  const H = 300 + rows.length * rowH + 60;

  const canvas = document.createElement('canvas');
  canvas.width  = W * 2;   // 2x for retina
  canvas.height = H * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // ── BACKGROUND ────────────────────────────────────────────
  ctx.fillStyle = '#080800';
  ctx.fillRect(0, 0, W, H);

  // grid lines
  ctx.strokeStyle = 'rgba(255,215,0,0.025)';
  ctx.lineWidth = 0.5;
  for(let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // glow top
  const grd = ctx.createRadialGradient(W/2,0,10,W/2,0,200);
  grd.addColorStop(0,'rgba(255,215,0,0.12)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // border
  ctx.strokeStyle = 'rgba(255,215,0,0.5)';
  ctx.lineWidth   = 1.5;
  roundRect(ctx, 8, 8, W-16, H-16, 16);
  ctx.stroke();

  // inner border
  ctx.strokeStyle = 'rgba(255,215,0,0.15)';
  ctx.lineWidth   = 0.5;
  roundRect(ctx, 12, 12, W-24, H-24, 13);
  ctx.stroke();

  let y = PADDING + 10;

  // ── HEADER: STORE NAME ────────────────────────────────────
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = 'rgba(255,215,0,0.5)';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '3px';
  ctx.fillText(storeName.toUpperCase(), W/2, y+14);
  y += 30;

  // ── TITLE ─────────────────────────────────────────────────
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(255,215,0,0.5)';
  ctx.shadowBlur  = 14;
  ctx.fillText('SHIFT REPORT', W/2, y+18);
  ctx.shadowBlur = 0;
  y += 36;

  // ── DIVIDER ───────────────────────────────────────────────
  drawDivider(ctx, PADDING, y, W-PADDING*2);
  y += 16;

  // ── EMPLOYEE INFO ─────────────────────────────────────────
  ctx.textAlign = 'center';
  ctx.font      = 'bold 18px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(s.empName, W/2, y+14);
  y += 24;

  ctx.font      = '12px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(emp ? emp.shift : '', W/2, y+12);
  y += 22;

  // ── DATE / TIME ROW ───────────────────────────────────────
  ctx.font      = 'bold 12px monospace';
  ctx.fillStyle = 'rgba(255,215,0,0.7)';
  const dateStr = `📅 ${s.date}   ⏰ ${s.startTime||'-'} → ${s.endTime||'ຍັງດຳເນີນ'}   ⏱ ${s.hours?(s.hours.toFixed(1)+'h'):'-'}`;
  ctx.fillText(dateStr, W/2, y+12);
  y += 26;

  drawDivider(ctx, PADDING, y, W-PADDING*2);
  y += 18;

  // ── DATA ROWS ─────────────────────────────────────────────
  ctx.textAlign = 'left';
  rows.forEach(([label, value, color]) => {
    // label
    ctx.font      = '13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(label, PADDING+8, y+rowH/2+5);
    // dots
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for(let dx=180;dx<W-PADDING-80;dx+=6) ctx.fillText('.', dx, y+rowH/2+5);
    // value
    ctx.font      = 'bold 14px monospace';
    ctx.fillStyle = color;
    ctx.textAlign = 'right';
    ctx.fillText(value, W-PADDING-8, y+rowH/2+5);
    ctx.textAlign = 'left';
    // separator line
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth   = 0.5;
    ctx.beginPath(); ctx.moveTo(PADDING,y+rowH); ctx.lineTo(W-PADDING,y+rowH); ctx.stroke();
    y += rowH;
  });

  y += 8;
  drawDivider(ctx, PADDING, y, W-PADDING*2, '#FFD700');
  y += 20;

  // ── TOTAL NET ─────────────────────────────────────────────
  const net = totalRev - commission;
  ctx.textAlign  = 'left';
  ctx.font       = 'bold 15px sans-serif';
  ctx.fillStyle  = 'rgba(255,255,255,0.7)';
  ctx.fillText('ສຸດທິ (ຫຼັງ Commission)', PADDING+8, y+14);
  ctx.font       = 'bold 20px monospace';
  ctx.fillStyle  = '#00ff88';
  ctx.shadowColor = 'rgba(0,255,136,0.5)';
  ctx.shadowBlur  = 10;
  ctx.textAlign   = 'right';
  ctx.fillText(fmt(net), W-PADDING-8, y+16);
  ctx.shadowBlur  = 0;
  y += 36;

  drawDivider(ctx, PADDING, y, W-PADDING*2);
  y += 18;

  // ── STATUS BADGE ──────────────────────────────────────────
  const statusText = s.endTime ? '✅ ປິດ Shift ສຳເລັດ' : '🟢 Shift ດຳເນີນຢູ່';
  ctx.textAlign  = 'center';
  ctx.font       = 'bold 13px sans-serif';
  ctx.fillStyle  = s.endTime ? '#00ff88' : '#FFD700';
  ctx.fillText(statusText, W/2, y+14);
  y += 28;

  // ── FOOTER ────────────────────────────────────────────────
  ctx.font      = '10px monospace';
  ctx.fillStyle = 'rgba(255,215,0,0.3)';
  ctx.fillText(`Generated: ${new Date().toLocaleString()} | 4king77 System`, W/2, y+12);

  // ── DOWNLOAD ──────────────────────────────────────────────
  const a = document.createElement('a');
  a.download = `shift_${s.empName}_${s.date}.png`;
  a.href     = canvas.toDataURL('image/png');
  a.click();
  showToast(`📸 Export ຮູບ Shift ຂອງ ${s.empName} ສຳເລັດ`);
}

// helper: rounded rect path
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// helper: divider line with optional color
function drawDivider(ctx, x, y, w, color){
  const grad = ctx.createLinearGradient(x, y, x+w, y);
  grad.addColorStop(0,   'transparent');
  grad.addColorStop(0.3, color||'rgba(255,215,0,0.3)');
  grad.addColorStop(0.7, color||'rgba(255,215,0,0.3)');
  grad.addColorStop(1,   'transparent');
  ctx.strokeStyle = grad;
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w,y); ctx.stroke();
}

function getExpFiltered(){
  const now = new Date();
  const td = today();
  // week start (Monday)
  const dow = now.getDay()===0?6:now.getDay()-1;
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-dow);
  const ws = weekStart.toISOString().slice(0,10);
  const ms = td.slice(0,7);
  return DB.expenses.filter(e=>{
    if(_expPeriod==='day') return (e.date||'')===td;
    if(_expPeriod==='week') return (e.date||'')>=ws && (e.date||'')<=td;
    if(_expPeriod==='month') return (e.date||'').startsWith(ms);
    return true;
  });
}

function renderExpBarChart(exps){

  let groups = {};
  const now = new Date(); const td = today();

  if(_expPeriod==='day'){
    // group by category
    exps.forEach(e=>{ groups[e.category]=(groups[e.category]||0)+e.amount; });
  } else if(_expPeriod==='week'){
    // group by day of week
    const days=['ຈ','ອ','ພ','ພຫ','ສ','ເສ','ອາ'];
    for(let i=6;i>=0;i--){
      const d=new Date(now); d.setDate(now.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      const dow=d.getDay()===0?6:d.getDay()-1;
      const label=days[dow]+(ds===td?' (ນີ້)':'');
      groups[ds]={label,val:0};
    }
    exps.forEach(e=>{ if(groups[e.date]) groups[e.date].val+=e.amount; });
    const entries=Object.values(groups);
    const maxV=Math.max(...entries.map(g=>g.val),1);
    wrap.innerHTML=`<div class="bc" style="height:100px;align-items:flex-end;gap:4px;">
      ${entries.map(g=>`<div class="bcc">
        <div style="font-size:9px;color:var(--gold);margin-bottom:2px;">${g.val>0?(g.val/1000000).toFixed(1)+'M':''}</div>
        <div style="width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--red),#cc2233);min-height:3px;height:${Math.max(4,(g.val/maxV)*80)}px;box-shadow:0 0 6px rgba(255,68,85,0.3);"></div>
        <div class="bday" style="font-size:9px;">${g.label}</div>
      </div>`).join('')}
    </div>`;
    return;
  } else if(_expPeriod==='month'){
    // group by week of month
    exps.forEach(e=>{
      if(!e.date) return;
      const d=new Date(e.date); const wk=Math.ceil(d.getDate()/7);
      const label='ອາທິດ'+wk;
      groups[label]=(groups[label]||0)+e.amount;
    });
  } else {
    // all — group by month
    exps.forEach(e=>{
      if(!e.date) return;
      const m=e.date.slice(0,7);
      groups[m]=(groups[m]||0)+e.amount;
    });
  }

  if(_expPeriod==='day'){
    // category bar chart
    const entries=Object.entries(groups).sort((a,b)=>b[1]-a[1]);
    const maxV=Math.max(...entries.map(g=>g[1]),1);
    wrap.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
      ${entries.map(([cat,val])=>`
      <div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;">
          <span style="color:${CAT_COLORS[cat]||'var(--gold)'};">${cat}</span>
          <span style="color:var(--text-dim);">${fmt(val)}</span>
        </div>
        <div style="height:8px;background:rgba(255,255,255,0.05);border-radius:4px;">
          <div style="height:100%;width:${(val/maxV*100).toFixed(1)}%;background:${CAT_COLORS[cat]||'var(--gold)'};border-radius:4px;box-shadow:0 0 6px ${CAT_COLORS[cat]||'var(--gold)'}44;transition:width .4s;"></div>
        </div>
      </div>`).join('')}
    </div>`;
    return;
  }

  const entries=Object.entries(groups).sort((a,b)=>a[0]>b[0]?1:-1);
  const maxV=Math.max(...entries.map(g=>g[1]),1);
  wrap.innerHTML=`<div class="bc" style="height:100px;align-items:flex-end;gap:4px;">
    ${entries.map(([lbl,val])=>`<div class="bcc">
      <div style="font-size:9px;color:var(--red);margin-bottom:2px;">${val>0?(val/1000000).toFixed(1)+'M':''}</div>
      <div style="width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--red),#cc2233);min-height:3px;height:${Math.max(4,(val/maxV)*80)}px;box-shadow:0 0 6px rgba(255,68,85,0.3);"></div>
      <div class="bday" style="font-size:9px;">${lbl.length>7?lbl.slice(5):lbl}</div>
    </div>`).join('')}
  </div>`;
}

function renderExpPieChart(exps){
  const wrap = document.getElementById('exp-pie-wrap'); if(!wrap) return;
  if(exps.length===0){ wrap.innerHTML='<div class="empty" style="padding:24px 0;"><p>ບໍ່ມີຂໍ້ມູນ</p></div>'; return; }
  const cats={};
  exps.forEach(e=>{ cats[e.category]=(cats[e.category]||0)+e.amount; });
  const total=Object.values(cats).reduce((a,b)=>a+b,0)||1;
  const entries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);

  // SVG donut chart
  const cx=80, cy=80, r=60, ri=38;
  let angle=-Math.PI/2;
  const slices=entries.map(([cat,val])=>{
    const sweep=val/total*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const xi1=cx+ri*Math.cos(angle-sweep), yi1=cy+ri*Math.sin(angle-sweep);
    const xi2=cx+ri*Math.cos(angle), yi2=cy+ri*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return {cat,val,color:CAT_COLORS[cat]||'#aaa',
      d:`M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z`};
  });

  wrap.innerHTML=`
  <svg viewBox="0 0 200 160" width="100%" style="max-height:160px;">
    ${slices.map(s=>`<path d="${s.d}" fill="${s.color}" opacity="0.88" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>`).join('')}
    <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9" font-family="'Share Tech Mono',monospace">ລາຍຈ່າຍ</text>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" fill="var(--red,#ff4455)" font-size="10" font-weight="bold" font-family="'Orbitron',monospace">${(exps.length)}</text>
    <text x="${cx}" y="${cy+20}" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="sans-serif">ລາຍການ</text>
    ${entries.slice(0,5).map(([cat,val],i)=>`
      <rect x="165" y="${14+i*22}" width="9" height="9" rx="2" fill="${CAT_COLORS[cat]||'#aaa'}"/>
      <text x="178" y="${22+i*22}" font-size="8.5" fill="rgba(255,255,255,0.7)" font-family="sans-serif">${cat}</text>
      <text x="198" y="${22+i*22}" text-anchor="end" font-size="8" fill="rgba(255,255,255,0.45)" font-family="sans-serif">${(val/total*100).toFixed(0)}%</text>
    `).join('')}
  </svg>`;
}

function sortExpTable(col){
  if(_expSort.col===col) _expSort.asc=!_expSort.asc;
  else { _expSort.col=col; _expSort.asc=col==='date'?false:true; }
  renderExpTable();
}

function renderExpTable(q){
  const tb=document.getElementById('exp-tbody'); if(!tb) return;
  const search=(q!==undefined?q:(document.getElementById('exp-search')?.value||'')).toLowerCase();
  const catF=document.getElementById('exp-cat-filter')?.value||'';
  let rows=getExpFiltered();
  if(search) rows=rows.filter(e=>e.name.toLowerCase().includes(search)||e.category.toLowerCase().includes(search)||(e.notes||'').toLowerCase().includes(search)||(e.date||'').includes(search));
  if(catF) rows=rows.filter(e=>e.category===catF);
  // sort
  rows=[...rows].sort((a,b)=>{
    let va=a[_expSort.col]||'', vb=b[_expSort.col]||'';
    if(_expSort.col==='amount'){ va=Number(va); vb=Number(vb); }
    const cmp=va<vb?-1:va>vb?1:0;
    return _expSort.asc?cmp:-cmp;
  });

function getReserve(){
  if(!DB.reserve) DB.reserve = {balance:0, target:50000000, transactions:[]};
  if(!DB.reserve.transactions) DB.reserve.transactions = [];
  return DB.reserve;
}

// ເງິນສຳຮອງທີ່ user ຝາກ (transactions) + sync ກັບ expense ໝວດ "ສຳຮອງ"
// ລາຍຈ່າຍໝວດ "ສຳຮອງ" = ເງິນທີ່ຖືກຫັກໄປໃຊ້ → ຫັກຈາກ balance
function reserveNetBalance(){
  const r    = getReserve();
  const bal  = r.balance || 0;
  // ລາຍຈ່າຍທັງໝົດ — ຫັກອອກຈາກເງິນສຳຮອງ
  const used = DB.expenses.reduce((a,b)=>a+b.amount, 0);
  return { balance: bal, used, net: bal - used };
}

let _rvType = 'in';
function setRvType(t){
  _rvType = t;
  const ib = document.getElementById('rv-in-btn');
  const ob = document.getElementById('rv-out-btn');
  if(!ib||!ob) return;
  if(t==='in'){
    ib.className='btn btn-green'; ib.style.flex='1'; ib.style.fontSize='13px';
    ob.className='btn btn-outline'; ob.style.flex='1'; ob.style.fontSize='13px'; ob.style.color='var(--red)'; ob.style.borderColor='rgba(255,68,85,0.4)';
  } else {
    ob.style.background='rgba(255,68,85,0.15)'; ob.style.border='1px solid rgba(255,68,85,0.5)'; ob.style.color='var(--red)'; ob.style.flex='1'; ob.style.fontSize='13px';
    ob.className='btn'; 
    ib.className='btn btn-outline'; ib.style.flex='1'; ib.style.fontSize='13px';
  }
}

function submitReserve(){
  // ensure DB.reserve is initialised
  if(!DB.reserve) DB.reserve = {balance:0, target:50000000, transactions:[]};
  if(!DB.reserve.transactions) DB.reserve.transactions = [];
  const r   = DB.reserve;
  const amt = Number(document.getElementById('rv-amt').value)||0;
  const dt  = document.getElementById('rv-date').value||today();
  const nt  = document.getElementById('rv-note').value||'';
  if(!amt){ showToast('ໃສ່ຈຳນວນເງິນ','error'); return; }
  const {net:netNow} = reserveNetBalance();
  if(_rvType==='out' && amt > netNow){
    showToast('ຈຳນວນຖອນເກີນຍອດສຸດທິ! ຍອດມີ '+fmt(netNow),'error'); return;
  }
  const tx = {id:uid(), date:dt, type:_rvType, amount:amt, note:nt||(_rvType==='in'?'ຝາກເງິນສຳຮອງ':'ຖອນເງິນສຳຮອງ'), by:SESSION.user.name};
  r.transactions.unshift(tx);
  r.balance = (r.balance||0) + (_rvType==='in' ? amt : -amt);
  const newNet = reserveNetBalance().net;
  addLog(SESSION.user.name, (_rvType==='in'?'ຝາກ':'ຖອນ')+`ເງິນສຳຮອງ ${fmt(amt)}`, 'reserve');
  addNotif((_rvType==='in'?'💰 ຝາກ':'💸 ຖອນ')+`ເງິນສຳຮອງ ${fmt(amt)} — ຍອດສຸດທິ ${fmt(newNet)}`, 'reserve');
  saveData();
  document.getElementById('rv-amt').value='';
  document.getElementById('rv-note').value='';
  showToast((_rvType==='in'?'✅ ຝາກ':'✅ ຖອນ')+`ເງິນສຳຮອງ ${fmt(amt)} — ຍອດສຸດທິ: ${fmt(newNet)}`);
  pgReserve();
}

function saveReserveTarget(){
  const tgt = Number(document.getElementById('rv-tgt').value)||0;
  if(!tgt){ showToast('ໃສ່ເປົ້າໝາຍ','error'); return; }
  getReserve().target = tgt;
  addLog(SESSION.user.name, `ຕັ້ງເປົ້າເງິນສຳຮອງ ${fmt(tgt)}`, 'settings');
  saveData();
  showToast('ບັນທຶກເປົ້າໝາຍສຳເລັດ');
  pgReserve();
}

function delReserveTx(id){
  const r   = getReserve();
  const tx  = r.transactions.find(x=>x.id===id);
  if(!tx || !confirm(`ລຶບລາຍການ "${tx.note||tx.type}" ${fmt(tx.amount)} ແທ້ບໍ?`)) return;
  r.balance += tx.type==='in' ? -tx.amount : tx.amount;
  r.transactions = r.transactions.filter(x=>x.id!==id);
  addLog(SESSION.user.name,`ລຶບທຸລະກຳເງິນສຳຮອງ ${fmt(tx.amount)}`,'reserve');
  saveData();
  showToast('ລຶບສຳເລັດ');
  pgReserve();
}

function renderReserveTxTable(q){
  const tb = document.getElementById('rv-tbody'); if(!tb) return;
  const r  = getReserve();
  const typeF = document.getElementById('rv-tbl-filter')?.value||'';
  const search = (q!==undefined?q:(document.getElementById('rv-search')?.value||'')).toLowerCase();
  let rows = [...(r.transactions||[])];
  if(typeF) rows = rows.filter(x=>x.type===typeF);
  if(search) rows = rows.filter(x=>(x.note||'').toLowerCase().includes(search)||(x.by||'').toLowerCase().includes(search)||(x.date||'').includes(search));

  if(rows.length===0){
    tb.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--text-faint);">ບໍ່ມີລາຍການ</td></tr>`;
    return;
  }

  // compute running balance from oldest to newest
  const allTx = [...(r.transactions||[])].reverse();
  const runMap = {};
  let run = 0;
  allTx.forEach(t=>{ run += t.type==='in'?t.amount:-t.amount; runMap[t.id]=run; });

  tb.innerHTML = rows.map(tx=>`<tr>
    <td class="td fm" style="font-size:12px;">${tx.date||'-'}</td>
    <td>
      <span class="badge ${tx.type==='in'?'bon':'boff'}">${tx.type==='in'?'📥 ຝາກ':'📤 ຖອນ'}</span>
    </td>
    <td style="font-weight:800;color:${tx.type==='in'?'var(--green)':'var(--red)'};">
      ${tx.type==='in'?'+':'-'}${fmt(tx.amount)}
    </td>
    <td class="td" style="font-size:12px;">${tx.note||'-'}</td>
    <td class="td" style="font-size:12px;">${tx.by||'-'}</td>
    <td style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--blue);">${fmt(runMap[tx.id]||0)}</td>
    <td><button class="btn btn-red" style="font-size:10px;padding:4px 8px;" onclick="delReserveTx(${tx.id})">✕</button></td>
  </tr>`).join('');

  const tot  = rows.filter(t=>t.type==='in').reduce((a,b)=>a+b.amount,0);
  const totO = rows.filter(t=>t.type==='out').reduce((a,b)=>a+b.amount,0);
  const sm   = document.getElementById('rv-summary');
  if(sm) sm.innerHTML=`<div class="sum-row" style="margin-top:10px;">
    <span class="td">${rows.length} ລາຍການ</span>
    <span style="display:flex;gap:20px;">
      <span>ຝາກ: <span class="tgr bold">${fmt(tot)}</span></span>
      <span>ຖອນ: <span class="tr bold">${fmt(totO)}</span></span>
    </span>
  </div>`;
}

        <div class="fgr"><label>Role</label>

          </select>

    [{label:'💾 ບັນທຶກ',cls:'btn btn-gold',fn:()=>{

      const username=document.getElementById('uf-u').value.trim();
      const pw=document.getElementById('uf-p').value;
      const role=document.getElementById('uf-r').value;
      if(!name||!username){ showToast('ໃສ່ຊື່ ແລະ username','error'); return; }
      if(id){
        DB.users=DB.users.map(x=>x.id===id?{...x,name,username,role,...(pw?{password:pw}:{})}:x);
        showToast('ແກ້ໄຂຜູ້ໃຊ້ສຳເລັດ');
      } else {
        if(!pw){ showToast('ໃສ່ລະຫັດຜ່ານ','error'); return; }

      saveData(); closeModal(); renderUserTable();

function delUser(id){
  const u=DB.users.find(x=>x.id===id);
  if(!confirm(`ລຶບ "${u.name}" ແທ້ບໍ?`)) return;
  DB.users=DB.users.filter(x=>x.id!==id);
  addLog(SESSION.user.name,`ລຶບຜູ້ໃຊ້: ${u.username}`,'settings');
  saveData(); renderUserTable(); showToast('ລຶບສຳເລັດ');
}

let _rptActivePreset = 0;
function setRptPreset(fn, idx){
  const [f,t] = fn();
  _rptFrom = f; _rptTo = t;
  const fi=document.getElementById('rpt-from'); if(fi) fi.value=f;
  const ti=document.getElementById('rpt-to');   if(ti) ti.value=t;
  _rptActivePreset = idx;
  // update pill styles
  for(let i=0;i<6;i++){
    const el=document.getElementById('rpt-preset-'+i); if(!el) continue;
    el.style.background = i===idx ? 'rgba(68,170,255,0.25)' : 'rgba(68,170,255,0.07)';
    el.style.color      = i===idx ? 'var(--blue)' : 'rgba(68,170,255,0.6)';
  }
  renderRptAll();
}

function applyRptRange(){
  _rptFrom = document.getElementById('rpt-from')?.value || _rptFrom;
  _rptTo   = document.getElementById('rpt-to')?.value   || _rptTo;
  if(_rptFrom > _rptTo){ showToast('ວັນທີເລີ່ມຕ້ອງໜ້ອຍກວ່າ','error'); return; }
  // deactivate all presets
  for(let i=0;i<6;i++){
    const el=document.getElementById('rpt-preset-'+i); if(!el) continue;
    el.style.background='rgba(68,170,255,0.07)'; el.style.color='rgba(68,170,255,0.6)';
  }
  renderRptAll();
}

function getRptRevs(){ return DB.revenues.filter(r=>(r.date||'')>=_rptFrom&&(r.date||'')<=_rptTo); }
function getRptExps(){ return DB.expenses.filter(e=>(e.date||'')>=_rptFrom&&(e.date||'')<=_rptTo); }

function renderRptAll(){
  const revs   = getRptRevs();
  const exps   = getRptExps();
  const rev    = revs.reduce((a,b)=>a+b.amount,0);
  const dep    = revs.reduce((a,b)=>a+(b.deposit||0),0);
  const wit    = revs.reduce((a,b)=>a+(b.withdraw||0),0);
  const prz    = revs.reduce((a,b)=>a+(b.prize||0),0);
  const bon    = revs.reduce((a,b)=>a+(b.bonus||0),0);
  const exp    = exps.reduce((a,b)=>a+b.amount,0);

function exportCSVRange(){
  const revs=getRptRevs(), exps=getRptExps();
  const rows=[['=== ລາຍຮັບ ==='],['ວັນທີ','ພະນັກງານ','ລາຍຮັບ','ຝາກ','ຖອນ','ຄ່າທຳນຽມ','Bonus','Commission','ໝາຍເຫດ']];
  revs.forEach(r=>{const t=getCommTier(r.amount);rows.push([r.date,r.empName,r.amount,r.deposit||0,r.withdraw||0,r.prize||0,r.bonus||0,Math.round(r.amount*t.rate/100),r.notes||'']);});
  const totRev=revs.reduce((a,b)=>a+b.amount,0);
  rows.push(['ລວມ','',totRev,'','','','','','']);rows.push([]);
  rows.push(['=== ລາຍຈ່າຍ ==='],['ວັນທີ','ຊື່','ໝວດ','ຈຳນວນ','ໝາຍເຫດ']);
  exps.forEach(e=>rows.push([e.date||'',e.name,e.category,e.amount,e.notes||'']));
  const totExp=exps.reduce((a,b)=>a+b.amount,0);
  rows.push(['ລວມ','','',totExp,'']);rows.push([]);
  rows.push(['=== ສະຫຼຸບ ==='],['ລາຍຮັບ',totRev],['ລາຍຈ່າຍ',totExp],['ກຳໄລ',totRev-totExp]);
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`4king77_${_rptFrom}_${_rptTo}.csv`;a.click();
  showToast('Export CSV ສຳເລັດ');
}

// ===== FIREBASE CONFIG MANAGEMENT =====
function saveFirebaseCfg(){
  const dbUrl = document.getElementById('fb-url').value.trim();
  const apiKey = document.getElementById('fb-key').value.trim();
  if(!dbUrl || !apiKey){ showToast('ກະລຸນາໃສ່ທັງ Database URL ແລະ Secret','error'); return; }
  if(!dbUrl.startsWith('https://')){ showToast('Database URL ບໍ່ຖືກຕ້ອງ','error'); return; }
  _fbCfg = { dbUrl, apiKey };
  localStorage.setItem(FB_KEY, JSON.stringify(_fbCfg));
  showSyncStatus('saving');
  showToast('✅ ບັນທຶກ Firebase config — ກຳລັງທົດສອບ...');
  setTimeout(()=>testFirebase(), 400);
}

function clearFirebaseCfg(){
  _fbCfg = null;
  localStorage.removeItem(FB_KEY);
  showSyncStatus('error');
  const el1 = document.getElementById('fb-url'); if(el1) el1.value='';
  const el2 = document.getElementById('fb-key'); if(el2) el2.value='';
  const r = document.getElementById('fb-test-result');
  if(r){ r.textContent='⚠ Config ຖືກລຶບແລ້ວ'; r.style.color='var(--red)'; }
  showToast('ລຶບ Firebase config ແລ້ວ');
}

async function testFirebase(){
  const r = document.getElementById('fb-test-result');
  if(!isFirebaseConfigured()){
    if(r){ r.textContent='⚠ ໃສ່ Database URL ແລະ Secret ກ່ອນ'; r.style.color='var(--red)'; }
    return;
  }
  if(r){ r.textContent='⏳ ກຳລັງທົດສອບ Firebase...'; r.style.color='var(--text-dim)'; }
  try{
    // Write a ping then read back
    await fbWrite('4king77_ping', { t: Date.now() });
    const ping = await fbRead('4king77_ping');
    if(ping && ping.t){
      if(r){ r.textContent='✅ Firebase ເຊື່ອມຕໍ່ສຳເລັດ! Real-Time sync ພ້ອມໃຊ້'; r.style.color='var(--green)'; }
      showSyncStatus('saved');
      showToast('🔥 Firebase ເຊື່ອມຕໍ່ສຳເລັດ — Real-Time LIVE!');
      // Push current DB to Firebase
      await fbWrite('4king77', DB);
      _lastSavedHash = dbHash();
      // Restart polling
      startPolling();
      navigate('settings');
    } else { throw new Error('ບໍ່ໄດ້ຮັບ response'); }
  }catch(e){
    if(r){ r.textContent='❌ ການເຊື່ອມຕໍ່ລົ້ມເຫຼວ: '+e.message+' — ກວດ URL/Secret ຄືນ'; r.style.color='var(--red)'; }
    showSyncStatus('error');
  }
}

function saveSettings(){
  DB.settings.storeName=document.getElementById('set-sn').value;
